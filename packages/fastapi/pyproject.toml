[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/main.py",
    "app/routes/chat.py",
    "app/routes/sandbox.py",
    "app/routes/terminal.py",
    "app/services/openrouter.py",
    "app/services/mcp_client.py",
    "app/services/mcp_oauth.py",
    "app/services/daytona_service.py",
    "app/services/sandbox_tools.py",
    # ACP agent gateway orchestration: exercised by the live E2E scripts
    # (scripts/acp_*.py) against real Daytona sandboxes + agents — unit
    # coverage would be mock theater. credentials.py and registry.py stay
    # measured (real unit tests).
    "app/routes/agents.py",
    "app/services/agents/acp_client.py",
    "app/services/agents/daytona_runtime.py",
    "app/services/agents/session_manager.py",
]

[tool.coverage.report]
precision = 2
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "except Exception:",
]
show_missing = true
skip_covered = false
fail_under = 70
