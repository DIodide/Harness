[project]
name = "harness-api"
version = "0.1.0"
description = "Harness FastAPI backend - LLM inference and MCP client"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "openai>=1.82.0",
    "mcp>=1.9.0",
    "httpx>=0.28.0",
    "pydantic-settings>=2.9.0",
    "python-dotenv>=1.1.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.11.0",
]

[tool.ruff]
line-length = 88
target-version = "py311"
